harvest:
  name: services.aws.s3.buckets
  description: Retrieve information about S3 buckets
  global: true
  unique_identifier_keys:
    - Harvest.Platform
    - Harvest.Service
    - Harvest.Type
    - Harvest.AccountId
    - Name

  singleton_keys:
    - Name

  indexes:
    - keys: Name

  tasks:
    all:
      - aws: &list_s3_buckets
          name: List S3 Buckets
          command: list_buckets
          global_service: true

    # S3 only provides the 'prefix' filter for listing objects. Therefore, a singleton call may return multiple buckets
    # if the prefix is not unique.

    single:
        - <<: *list_s3_buckets
          command: get_bucket_location
          arguments:
            Prefix: var.Name